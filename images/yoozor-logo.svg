<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Icon mark -->
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a5cff"/>
      <stop offset="100%" stop-color="#1448cc"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e8d28c"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="72" height="72" rx="18" fill="url(#brandGrad)"/>

  <!-- Y shape - main structure -->
  <path d="M28 24 L40 40 L52 24" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="40" y1="40" x2="40" y2="58" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Snowflake/air accent dots -->
  <circle cx="26" cy="21" r="2.5" fill="url(#goldGrad)"/>
  <circle cx="54" cy="21" r="2.5" fill="url(#goldGrad)"/>
  <circle cx="40" cy="62" r="2.5" fill="url(#goldGrad)"/>

  <!-- Wordmark -->
  <text x="92" y="38" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="30" font-weight="700" fill="#1a1a2e" letter-spacing="-0.03">Yoozor</text>
  <text x="92" y="58" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="13" font-weight="500" fill="#5a6478" letter-spacing="0.15">CLIMATE CONTROL SOLUTIONS</text>
</svg>
